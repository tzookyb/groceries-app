name: Bump version on push to main

# Increments the integer APP_VERSION in index.html (and keeps the service-worker
# CACHE name in sync) on every push to main, so the deployed PWA always shows a
# higher number than the last one — tap the 🛒 logo to see it.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    # Skip the bot's own bump commit (belt-and-suspenders; pushes made with
    # GITHUB_TOKEN don't retrigger workflows anyway).
    if: "!contains(github.event.head_commit.message, 'ci: bump version')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Increment version
        run: |
          set -e
          CURRENT=$(grep -oP 'const APP_VERSION = \K[0-9]+' index.html)
          NEXT=$((CURRENT + 1))
          echo "Bumping APP_VERSION $CURRENT -> $NEXT"
          sed -i "s/const APP_VERSION = ${CURRENT};/const APP_VERSION = ${NEXT};/" index.html
          sed -i "s/const CACHE = 'grocery-v[0-9]*';/const CACHE = 'grocery-v${NEXT}';/" sw.js
          echo "VERSION=$NEXT" >> "$GITHUB_ENV"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js
          git commit -m "ci: bump version to ${VERSION} [skip ci]"
          git push
